name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run repository validation
        run: python tests/validate_skill.py
      - name: Run install smoke test
        run: python tests/install_smoke.py
      - name: Run official skill validator
        run: |
          python -m pip install pyyaml
          python tests/official_validate.py
